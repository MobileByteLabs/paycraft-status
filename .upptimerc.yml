# docs.paycraft.mobilebytesensei.com + status.paycraft.mobilebytesensei.com
# probes deferred until Cloudflare Pages project (paycraft-docs) is created
# and upptime self-probe loop avoided. Re-add after Phase 2 T6 lands.

status-website:
  cname: status.paycraft.mobilebytesensei.com
  logoUrl: https://paycraft.mobilebytesensei.com/favicon.ico
  name: PayCraft
  introTitle: PayCraft platform status
  introMessage: |
    Real-time status of the PayCraft dashboard, webhook ingress, and end-to-end
